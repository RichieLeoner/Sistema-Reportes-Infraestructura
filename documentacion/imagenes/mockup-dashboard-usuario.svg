  <rect x="50" y="340" width="200" height="150" rx="5" fill="white" stroke="#e5e7eb"/>
  <text x="150" y="365" text-anchor="middle" font-size="12" font-weight="bold" fill="#1f2937">Actividad</text>
  
  <circle cx="70" cy="390" r="8" fill="#10b981"/>
  <text x="85" y="394" font-size="9" fill="#374151">Reporte #12 creado</text>
  <text x="170" y="394" font-size="8" fill="#9ca3af">Hace 2h</text>
  
  <circle cx="70" cy="415" r="8" fill="#3b82f6"/>
  <text x="85" y="419" font-size="9" fill="#374151">Reporte #10 actualizado</text>
  <text x="170" y="419" font-size="8" fill="#9ca3af">Ayer</text>
  
  <circle cx="70" cy="440" r="8" fill="#f59e0b"/>
  <text x="85" y="444" font-size="9" fill="#374151">Notificación leída</text>
  <text x="170" y="444" font-size="8" fill="#9ca3af">28/03</text>
  
  <!-- Footer -->
  <text x="450" y="500" text-anchor="middle" font-size="10" fill="#9ca3af">Sistema de Reporte de Infraestructura - ITSC © 2026</text>
  
  <!-- Etiquetas -->
  <line x1="40" y1="100" x2="50" y2="100" stroke="#8b5cf6"/>
  <text x="35" y="103" text-anchor="end" font-size="9" fill="#8b5cf6">Navbar</text>
  
  <line x1="260" y1="220" x2="245" y2="220" stroke="#10b981"/>
  <text x="240" y="223" text-anchor="end" font-size="9" fill="#10b981">Stats</text>
  
  <line x1="560" y1="270" x2="860" y2="270" stroke="#f59e0b"/>
  <text x="865" y="273" font-size="9" fill="#f59e0b">Tabla reportes</text>
