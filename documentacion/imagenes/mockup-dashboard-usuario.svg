  <text x="645" y="244" text-anchor="middle" font-size="8" fill="white">BAJA</text>
  <rect x="700" y="230" width="60" height="20" rx="10" fill="#10b981"/>
  <text x="730" y="244" text-anchor="middle" font-size="8" fill="white">RESUELTO</text>
  <text x="780" y="247" font-size="10" fill="#6b7280">28/03</text>
  
  <rect x="280" y="260" width="560" height="35" fill="#f9fafb"/>
  <text x="300" y="282" font-size="10" fill="#374151">3</text>
  <text x="330" y="282" font-size="10" fill="#374151">Baños Piso 2</text>
  <text x="480" y="282" font-size="10" fill="#374151">Fuga de agua</text>
  <rect x="620" y="265" width="50" height="20" rx="10" fill="#3b82f6"/>
  <text x="645" y="279" text-anchor="middle" font-size="8" fill="white">MEDIA</text>
  <rect x="700" y="265" width="60" height="20" rx="10" fill="#3b82f6"/>
  <text x="730" y="279" text-anchor="middle" font-size="8" fill="white">EN PROCESO</text>
  <text x="780" y="282" font-size="10" fill="#6b7280">25/03</text>
  
  <!-- Botones de acción -->
  <rect x="280" y="310" width="560" height="30"/>
