<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700">
  <defs>
    <marker id="arrowMVC" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Fondo -->
  <rect width="1100" height="700" fill="#f8fafc"/>
  
  <!-- Título -->
  <text x="550" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e40af">DIAGRAMA DE FLUJO - ARQUITECTURA MVC</text>
  
  <!-- Usuario -->
  <circle cx="100" cy="350" r="50" fill="#10b981"/>
  <text x="100" y="345" text-anchor="middle" font-size="30" fill="white">👤</text>
  <text x="100" y="375" text-anchor="middle" font-size="12" font-weight="bold" fill="white">USUARIO</text>
  
  <!-- Navegador -->
  <rect x="220" y="300" width="120" height="100" rx="10" fill="#3b82f6"/>
  <text x="280" y="335" text-anchor="middle" font-size="24" fill="white">🌐</text>
  <text x="280" y="365" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Navegador</text>
  <text x="280" y="385" text-anchor="middle" font-size="10" fill="white">(Browser)</text>
  
  <!-- Router -->
  <rect x="400" y="300" width="100" height="100" rx="5" fill="#8b5cf6"/>
  <text x="450" y="335" text-anchor="middle" font-size="20" fill="white">📍</text>
  <text x="450" y="365" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Router</text>
  <text x="450" y="385" text-anchor="middle" font-size="9" fill="white">web.php</text>
  
  <!-- Middleware -->
  <rect x="550" y="300" width="100" height="100" rx="5" fill="#f59e0b"/>
  <text x="600" y="335" text-anchor="middle" font-size="20" fill="white">🛡️</text>
  <text x="600" y="365" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Middleware</text>
  <text x="600" y="385" text-anchor="middle" font-size="9" fill="white">CheckRole</text>
  
  <!-- Controlador -->
  <rect x="700" y="280" width="140" height="140" rx="10" fill="#ef4444"/>
  <text x="770" y="310" text-anchor="middle" font-size="12" font-weight="bold" fill="white">CONTROLADOR</text>
  <text x="770" y="335" text-anchor="middle" font-size="16" fill="white">⚙️</text>
  <text x="770" y="365" text-anchor="middle" font-size="10" fill="white">AuthController</text>
  <text x="770" y="380" text-anchor="middle" font-size="10" fill="white">ReporteController</text>
  <text x="770" y="395" text-anchor="middle" font-size="10" fill="white">DashboardController</text>
  
  <!-- Modelo -->
  <rect x="900" y="300" width="120" height="100" rx="5" fill="#10b981"/>
  <text x="960" y="335" text-anchor="middle" font-size="20" fill="white">📦</text>
  <text x="960" y="365" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Modelo</text>
  <text x="960" y="385" text-anchor="middle" font-size="9" fill="white">User, Ticket</text>
  
  <!-- Base de Datos -->
  <ellipse cx="1040" cy="250" rx="50" ry="30" fill="#6b7280"/>
  <rect x="990" y="250" width="100" height="70" fill="#6b7280"/>
  <ellipse cx="1040" cy="250" rx="50" ry="30" fill="#9ca3af"/>
  <text x="1040" y="300" text-anchor="middle" font-size="11" font-weight="bold" fill="white">MySQL</text>
  <text x="1040" y="315" text-anchor="middle" font-size="10" fill="white">BD</text>
  
  <!-- Vista -->
  <rect x="700" y="500" width="140" height="100" rx="10" fill="#3b82f6"/>
  <text x="770" y="535" text-anchor="middle" font-size="12" font-weight="bold" fill="white">VISTA</text>
  <text x="770" y="560" text-anchor="middle" font-size="20" fill="white">📄</text>
  <text x="770" y="585" text-anchor="middle" font-size="10" fill="white">Blade Template</text>
  
  <!-- Flechas del flujo -->
  <!-- Usuario -> Navegador -->
  <path d="M150 350 L220 350" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowMVC)"/>
  <text x="160" y="340" font-size="9" fill="#374151">1. Solicita</text>
  
  <!-- Navegador -> Router -->
  <path d="M340 350 L400 350" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowMVC)"/>
  <text x="345" y="340" font-size="9" fill="#374151">2. Request</text>
  
  <!-- Router -> Middleware -->
  <path d="M500 350 L550 350" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowMVC)"/>
  <text x="505" y="340" font-size="9" fill="#374151">3. Verifica</text>
  
  <!-- Middleware -> Controlador -->
  <path d="M650 350 L700 350" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowMVC)"/>
  <text x="655" y="340" font-size="9" fill="#374151">4. Ejecuta</text>
  
  <!-- Controlador -> Modelo -->
  <path d="M840 350 L900 350" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowMVC)"/>
  <text x="845" y="340" font-size="9" fill="#374151">5. Consulta</text>
  
  <!-- Modelo -> BD -->
  <path d="M1020 350 L1040 350" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowMVC)"/>
  <text x="1015" y="340" font-size="9" fill="#374151">6. Query</text>
  
  <!-- BD -> Modelo (retorno) -->
  <path d="M1040 370 L1020 370" stroke="#10b981" stroke-width="2" marker-end="url(#arrowMVC)"/>
  <text x="1015" y="390" font-size="9" fill="#10b981">7. Datos</text>
  
  <!-- Modelo -> Controlador (retorno) -->
  <path d="M900 370 L840 370" stroke="#10b981" stroke-width="2" marker-end="url(#arrowMVC)"/>
  <text x="845" y="390" font-size="9" fill="#10b981">8. Resultado</text>
  
  <!-- Controlador -> Vista -->
  <path d="M770 420 L770 500" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowMVC)"/>
  <text x="780" y="460" font-size="9" fill="#374151">9. Render</text>
  
  <!-- Vista -> Navegador (retorno final) -->
  <path d="M700 550 L650 550 L650 150 L280 150 L280 300" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowMVC)" fill="none"/>
  <text x="500" y="140" font-size="9" fill="#374151">10. HTML Response</text>
  
  <!-- Navegador -> Usuario (final) -->
  <path d="M220 370 L150 370" stroke="#10b981" stroke-width="2" marker-end="url(#arrowMVC)"/>
  <text x="160" y="390" font-size="9" fill="#10b981">11. Muestra</text>
  
  <!-- Leyenda de colores -->
  <rect x="50" y="550" width="300" height="130" rx="5" fill="white" stroke="#e5e7eb"/>
  <text x="200" y="570" text-anchor="middle" font-size="11" font-weight="bold" fill="#1f2937">LEYENDA DE COLORES</text>
  <rect x="65" y="580" width="20" height="15" fill="#10b981"/><text x="90" y="592" font-size="9" fill="#374151">Usuario/Modelo</text>
  <rect x="65" y="600" width="20" height="15" fill="#3b82f6"/><text x="90" y="612" font-size="9" fill="#374151">Navegador/Vista</text>
  <rect x="65" y="620" width="20" height="15" fill="#8b5cf6"/><text x="90" y="632" font-size="9" fill="#374151">Router</text>
  <rect x="180" y="580" width="20" height="15" fill="#f59e0b"/><text x="205" y="592" font-size="9" fill="#374151">Middleware</text>
  <rect x="180" y="600" width="20" height="15" fill="#ef4444"/><text x="205" y="612" font-size="9" fill="#374151">Controlador</text>
  <rect x="180" y="620" width="20" height="15" fill="#6b7280"/><text x="205" y="632" font-size="9" fill="#374151">Base de Datos</text>
  
  <!-- Notas adicionales -->
  <rect x="400" y="550" width="300" height="130" rx="5" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="550" y="570" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">FLUJO TÍPICO DE UNA PETICIÓN</text>
  <text x="410" y="590" font-size="9" fill="#374151">1. Usuario hace clic en enlace</text>
  <text x="410" y="605" font-size="9" fill="#374151">2. Navegador envía HTTP Request</text>
  <text x="410" y="620" font-size="9" fill="#374151">3. Router encuentra la ruta en web.php</text>
  <text x="410" y="635" font-size="9" fill="#374151">4. Middleware verifica autenticación/rol</text>
  <text x="410" y="650" font-size="9" fill="#374151">5. Controlador procesa la lógica</text>
  <text x="410" y="665" font-size="9" fill="#374151">6. Modelo consulta/actualiza BD</text>
  <text x="560" y="590" font-size="9" fill="#374151">7. BD retorna datos</text>
  <text x="560" y="605" font-size="9" fill="#374151">8. Controlador recibe resultado</text>
  <text x="560" y="620" font-size="9" fill="#374151">9. Controlador retorna Vista Blade</text>
  <text x="560" y="635" font-size="9" fill="#374151">10. HTML generado se envía al browser</text>
  <text x="560" y="650" font-size="9" fill="#374151">11. Usuario ve la página renderizada</text>
</svg>