<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700">
  <!-- Fondo -->
  <rect width="1000" height="700" fill="#f8fafc"/>
  
  <!-- Título -->
  <text x="500" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e40af">DIAGRAMA DE CASOS DE USO</text>
  
  <!-- Sistema (rectángulo grande) -->
  <rect x="200" y="60" width="600" height="580" rx="10" fill="white" stroke="#3b82f6" stroke-width="2" stroke-dasharray="10,5"/>
  <text x="500" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#3b82f6">SISTEMA DE REPORTES</text>
  
  <!-- Actores -->
  <!-- Estudiante -->
  <circle cx="80" cy="200" r="35" fill="#10b981"/>
  <text x="80" y="205" text-anchor="middle" font-size="24" fill="white">👨‍🎓</text>
  <text x="80" y="250" text-anchor="middle" font-size="11" font-weight="bold" fill="#059669">Estudiante</text>
  
  <!-- Mantenimiento -->
  <circle cx="920" cy="350" r="35" fill="#f59e0b"/>
  <text x="920" y="355" text-anchor="middle" font-size="24" fill="white">🔧</text>
  <text x="920" y="400" text-anchor="middle" font-size="11" font-weight="bold" fill="#d97706">Mantenimiento</text>
  
  <!-- Admin -->
  <circle cx="80" cy="550" r="35" fill="#ef4444"/>
  <text x="80" y="555" text-anchor="middle" font-size="24" fill="white">👤</text>
  <text x="80" y="600" text-anchor="middle" font-size="11" font-weight="bold" fill="#dc2626">Administrador</text>
  
  <!-- Casos de Uso (elipses) -->
  <!-- UC1: Iniciar Sesión -->
  <ellipse cx="500" cy="130" rx="70" ry="30" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="500" y="125" text-anchor="middle" font-size="10" fill="#1e40af">Iniciar</text>
  <text x="500" y="140" text-anchor="middle" font-size="10" fill="#1e40af">Sesión</text>
  
  <!-- UC2: Crear Reporte -->
  <ellipse cx="350" cy="220" rx="70" ry="30" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="350" y="215" text-anchor="middle" font-size="10" fill="#1e40af">Crear</text>
  <text x="350" y="230" text-anchor="middle" font-size="10" fill="#1e40af">Reporte</text>
  
  <!-- UC3: Listar Reportes -->
  <ellipse cx="500" cy="300" rx="70" ry="30" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="500" y="295" text-anchor="middle" font-size="10" fill="#1e40af">Listar</text>
  <text x="500" y="310" text-anchor="middle" font-size="10" fill="#1e40af">Reportes</text>
  
  <!-- UC4: Cambiar Estado -->
  <ellipse cx="650" cy="380" rx="70" ry="30" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="650" y="375" text-anchor="middle" font-size="10" fill="#1e40af">Cambiar</text>
  <text x="650" y="390" text-anchor="middle" font-size="10" fill="#1e40af">Estado</text>
  
  <!-- UC5: Consultar Historial -->
  <ellipse cx="350" cy="460" rx="70" ry="30" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="350" y="455" text-anchor="middle" font-size="10" fill="#1e40af">Consultar</text>
  <text x="350" y="470" text-anchor="middle" font-size="10" fill="#1e40af">Historial</text>
  
  <!-- UC6: Eliminar Reporte -->
  <ellipse cx="500" cy="540" rx="70" ry="30" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="500" y="535" text-anchor="middle" font-size="10" fill="#1e40af">Eliminar</text>
  <text x="500" y="550" text-anchor="middle" font-size="10" fill="#1e40af">Reporte</text>
  
  <!-- UC7: Ver Estadísticas -->
  <ellipse cx="650" cy="220" rx="70" ry="30" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="650" y="215" text-anchor="middle" font-size="10" fill="#1e40af">Ver</text>
  <text x="650" y="230" text-anchor="middle" font-size="10" fill="#1e40af">Estadísticas</text>
  
  <!-- UC8: Registrarse -->
  <ellipse cx="500" cy="620" rx="70" ry="30" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="500" y="615" text-anchor="middle" font-size="10" fill="#1e40af">Registrarse</text>
  
  <!-- Líneas de conexión -->
  <!-- Estudiante a casos de uso -->
  <line x1="115" y1="200" x2="280" y2="220" stroke="#374151" stroke-width="1.5"/>
  <line x1="115" y1="210" x2="430" y2="300" stroke="#374151" stroke-width="1.5"/>
  <line x1="100" y1="235" x2="130" y2="520" stroke="#374151" stroke-width="1.5"/>
  <line x1="115" y1="180" x2="430" y2="140" stroke="#374151" stroke-width="1.5"/>
  
  <!-- Mantenimiento a casos de uso -->
  <line x1="885" y1="350" x2="720" y2="380" stroke="#374151" stroke-width="1.5"/>
  <line x1="885" y1="340" x2="570" y2="300" stroke="#374151" stroke-width="1.5"/>
  <line x1="890" y1="320" x2="720" y2="240" stroke="#374151" stroke-width="1.5"/>
  
  <!-- Admin a casos de uso -->
  <line x1="115" y1="550" x2="280" y2="460" stroke="#374151" stroke-width="1.5"/>
  <line x1="115" y1="560" x2="430" y2="540" stroke="#374151" stroke-width="1.5"/>
  <line x1="100" y1="530" x2="430" y2="620" stroke="#374151" stroke-width="1.5"/>
  
  <!-- Include/Extend -->
  <line x1="500" y1="160" x2="500" y2="270" stroke="#374151" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="510" y="220" font-size="9" fill="#6b7280" font-style="italic">&lt;include&gt;</text>
</svg>