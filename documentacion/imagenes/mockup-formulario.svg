<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 700">
  <!-- Fondo -->
  <rect width="850" height="700" fill="#f3f4f6"/>
  
  <!-- Título -->
  <text x="425" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e40af">MOCKUP - FORMULARIO NUEVO REPORTE</text>
  
  <!-- Navbar simplificada -->
  <rect x="50" y="50" width="750" height="45" rx="5" fill="#1e40af"/>
  <text x="80" y="80" font-size="16" fill="white">🏛️ ITSC</text>
  <text x="200" y="80" font-size="11" fill="white">Dashboard</text>
  <text x="270" y="80" font-size="11" fill="white">Reportes</text>
  <text x="350" y="80" font-size="11" fill="white">Historial</text>
  <text x="680" y="80" font-size="11" fill="white">👤 Usuario</text>
  
  <!-- Contenedor del Formulario -->
  <rect x="175" y="115" width="500" height="520" rx="10" fill="white" stroke="#e5e7eb" stroke-width="2"/>
  
  <!-- Header -->
  <text x="425" y="150" text-anchor="middle" font-size="18" font-weight="bold" fill="#1f2937">📝 Nuevo Reporte</text>
  <text x="425" y="170" text-anchor="middle" font-size="11" fill="#6b7280">Reporta un problema de infraestructura</text>
  
  <!-- Campo: Ubicación -->
  <text x="205" y="205" font-size="11" font-weight="bold" fill="#374151">Ubicación <tspan fill="#ef4444">*</tspan></text>
  <rect x="205" y="215" width="440" height="40" rx="5" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="215" y="240" font-size="12" fill="#9ca3af">Ej: Aula 101, Laboratorio 3, Baños Piso 2</text>
  <text x="625" y="238" font-size="14" fill="#6b7280">📍</text>
  
  <!-- Campo: Descripción -->
  <text x="205" y="280" font-size="11" font-weight="bold" fill="#374151">Descripción <tspan fill="#ef4444">*</tspan></text>
  <rect x="205" y="290" width="440" height="100" rx="5" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="215" y="310" font-size="12" fill="#9ca3af">Describe el problema con detalle...</text>
  <text x="215" y="330" font-size="12" fill="#9ca3af">(mínimo 10 caracteres)</text>
  <text x="625" y="305" font-size="14" fill="#6b7280">📝</text>
  <text x="620" y="385" font-size="9" fill="#6b7280">0/1000</text>
  
  <!-- Campo: Prioridad -->
  <text x="205" y="415" font-size="11" font-weight="bold" fill="#374151">Prioridad <tspan fill="#ef4444">*</tspan></text>
  <rect x="205" y="425" width="440" height="40" rx="5" fill="#f9fafb" stroke="#d1d5db"/>
  
  <!-- Opciones de prioridad -->
  <rect x="220" y="432" width="70" height="26" rx="13" fill="#6b7280"/>
  <text x="255" y="450" text-anchor="middle" font-size="10" fill="white">BAJA</text>
  
  <rect x="300" y="432" width="70" height="26" rx="13" fill="#3b82f6"/>
  <text x="335" y="450" text-anchor="middle" font-size="10" fill="white">MEDIA</text>
  
  <rect x="380" y="432" width="70" height="26" rx="13" fill="white" stroke="#ef4444"/>
  <text x="415" y="450" text-anchor="middle" font-size="10" fill="#ef4444">ALTA</text>
  
  <text x="500" y="448" font-size="9" fill="#9ca3af">(Selecciona una)</text>
  
  <!-- Campo: Foto (opcional) -->
  <text x="205" y="490" font-size="11" font-weight="bold" fill="#374151">Foto (opcional)</text>
  <rect x="205" y="500" width="440" height="80" rx="5" fill="#f9fafb" stroke="#d1d5db" stroke-dasharray="5,5"/>
  <text x="425" y="530" text-anchor="middle" font-size="24" fill="#9ca3af">📷</text>
  <text x="425" y="550" text-anchor="middle" font-size="11" fill="#6b7280">Arrastra una imagen o haz clic para subir</text>
  <text x="425" y="565" text-anchor="middle" font-size="9" fill="#9ca3af">JPEG, PNG, GIF (máx 2MB)</text>
  
  <!-- Botones de acción -->
  <rect x="205" y="600" width="130" height="45" rx="5" fill="#9ca3af"/>
  <text x="270" y="628" text-anchor="middle" font-size="13" font-weight="bold" fill="white">CANCELAR</text>
  
  <rect x="365" y="600" width="280" height="45" rx="5" fill="#3b82f6"/>
  <text x="505" y="628" text-anchor="middle" font-size="13" font-weight="bold" fill="white">💾 GUARDAR REPORTE</text>
  
  <!-- Información adicional -->
  <rect x="205" y="655" width="440" height="30" rx="5" fill="#eff6ff"/>
  <text x="220" y="675" font-size="9" fill="#1e40af">ℹ️</text>
  <text x="235" y="675" font-size="9" fill="#1e40af">Los campos marcados con</text>
  <text x="380" y="675" font-size="9" fill="#ef4444">*</text>
  <text x="390" y="675" font-size="9" fill="#1e40af">son obligatorios</text>
  
  <!-- Etiquetas explicativas -->
  <line x1="195" y1="235" x2="170" y2="235" stroke="#8b5cf6"/>
  <text x="165" y="238" text-anchor="end" font-size="9" fill="#8b5cf6">Campo texto</text>
  
  <line x1="195" y1="340" x2="170" y2="340" stroke="#8b5cf6"/>
  <text x="165" y="343" text-anchor="end" font-size="9" fill="#8b5cf6">Textarea</text>
  
  <line x1="195" y1="445" x2="170" y2="445" stroke="#10b981"/>
  <text x="165" y="448" text-anchor="end" font-size="9" fill="#10b981">Radio buttons</text>
  
  <line x1="655" y1="540" x2="680" y2="540" stroke="#f59e0b"/>
  <text x="685" y="543" font-size="9" fill="#f59e0b">File upload</text>
  
  <line x1="370" y1="625" x2="350" y2="625" stroke="#ef4444"/>
  <text x="345" y="628" text-anchor="end" font-size="9" fill="#ef4444">Btn secundario</text>
  
  <line x1="655" y1="625" x2="680" y2="625" stroke="#3b82f6"/>
  <text x="685" y="628" font-size="9" fill="#3b82f6">Btn primario</text>
  
  <!-- Leyenda de colores de prioridad -->
  <rect x="580" y="115" width="120" height="70" rx="5" fill="white" stroke="#e5e7eb"/>
  <text x="640" y="130" text-anchor="middle" font-size="9" font-weight="bold" fill="#374151">PRIORIDADES</text>
  <rect x="590" y="140" width="15" height="15" rx="3" fill="#6b7280"/>
  <text x="610" y="151" font-size="8" fill="#374151">Baja</text>
  <rect x="590" y="160" width="15" height="15" rx="3" fill="#3b82f6"/>
  <text x="610" y="171" font-size="8" fill="#374151">Media</text>
  <rect x="590" y="180" width="15" height="15" rx="3" fill="#ef4444"/>
  <text x="610" y="191" font-size="8" fill="#374151">Alta</text>
</svg>